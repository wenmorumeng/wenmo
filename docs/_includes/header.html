<header class="topbar" data-topbar>
  <div class="topbar__inner">
    <a class="brand" href="{{ '/' | relative_url }}">
      <span class="brand__mark" aria-hidden="true"></span>
      <span class="brand__text">
        <strong>{{ site.title }}</strong>
        <span>{{ site.author.signature }}</span>
      </span>
    </a>

    <nav class="nav" aria-label="主导航">
      {% for item in site.data.navigation %}
        <a class="nav__link{% if page.url == item.url %} is-active{% endif %}" href="{{ item.url | relative_url }}">{{ item.title }}</a>
      {% endfor %}
    </nav>

    <button class="theme-toggle" type="button" data-theme-toggle aria-label="切换深色模式">
      <span data-theme-label>夜色</span>
    </button>
  </div>
</header>
