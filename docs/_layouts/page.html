---
layout: default
---
<section class="page-section">
  <div class="shell shell-narrow reveal">
    <header class="page-header">
      <p class="eyebrow">Page</p>
      <h1>{{ page.title }}</h1>
      {% if page.description %}
        <p class="page-description">{{ page.description }}</p>
      {% endif %}
    </header>
    <div class="article-body">
      {{ content }}
    </div>
  </div>
</section>
