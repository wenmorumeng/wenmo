---
layout: default
---
<section class="intro-card card">
  <div class="intro-card__copy">
    <p class="intro-card__eyebrow">首页</p>
    <h2>这里以后会放我自己的文章和记录。</h2>
    <p>现在先把页面搭起来，后面我会慢慢把图片、壁纸、文章和别的内容补进去。</p>
  </div>
  <div class="intro-card__aside">
    <p>先把地方收拾好，再慢慢往里面放东西。</p>
  </div>
</section>

<section class="note-grid">
  {% for note in site.data.notes %}
    <article class="note-card card">
      <p class="note-card__title">{{ note.title }}</p>
      <p>{{ note.text }}</p>
    </article>
  {% endfor %}
</section>

<section class="section-head">
  <div>
    <p class="section-head__eyebrow">最近写下</p>
    <h2>文章</h2>
  </div>
  <p>下面这些先拿来占位，后面我会自己慢慢换。</p>
</section>

<section class="post-stream">
  {% for post in site.posts %}
    {% include post-card.html post=post %}
  {% endfor %}
</section>
