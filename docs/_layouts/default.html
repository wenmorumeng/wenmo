<!DOCTYPE html>
<html lang="{{ site.lang }}">
  <head>
    {% include head.html %}
  </head>
  <body style="--banner-day: url('{{ site.appearance.banner_day | relative_url }}'); --banner-night: url('{{ site.appearance.banner_night | relative_url }}');">
    {% include header.html %}

    <section class="hero">
      <div class="hero__overlay"></div>
      <div class="hero__inner">
        <p class="hero__eyebrow">{{ page.hero_label | default: "WENMO BLOG" }}</p>
        <h1>{{ page.hero_title | default: page.title | default: site.title }}</h1>
        <p class="hero__lead">{{ page.description | default: site.description }}</p>
      </div>
    </section>

    <div class="content-frame">
      <div class="content-grid">
        {% include sidebar.html %}
        <main class="main-column">
          {{ content }}
          {% include footer.html %}
        </main>
      </div>
    </div>

    <script src="{{ '/assets/js/site.js' | relative_url }}"></script>
  </body>
</html>
